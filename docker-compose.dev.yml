services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:${APP_PORT:-4000}
      AUTH_URL: http://localhost:${APP_PORT:-4000}
      DATABASE_URL: postgresql://po_app:po_app@postgres:5432/po_app?schema=public
      EMAIL_TRANSPORT: smtp
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:${MINIO_API_PORT:-9000}
      MINIO_ACCESS_KEY: po_app_minio
      MINIO_SECRET_KEY: po_app_minio_secret
      MINIO_BUCKET: po-app-uploads
      WATCHPACK_POLLING: "1000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "${APP_PORT:-4000}:4000"
    volumes:
      - .:/app
      - po_app_node_modules:/app/node_modules
      - po_app_next:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: po_app
      POSTGRES_PASSWORD: po_app
      POSTGRES_DB: po_app
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - po_app_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U po_app -d po_app"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: po_app_minio
      MINIO_ROOT_PASSWORD: po_app_minio_secret
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - po_app_minio:/data

volumes:
  po_app_node_modules:
  po_app_next:
  po_app_postgres:
  po_app_minio:
